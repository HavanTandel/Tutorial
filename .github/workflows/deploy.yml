name: Deploy mern to eks

on: 
  workflow_dispatch:
  push:
    branches:
      - main

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Code
        uses: actions/checkout@v3

      - name: Configure AWS Credential
        uses: aws-actions/configure-aws-credentials@v2
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ap-south-1
      
      - name: Login to ECR
        run:  |
          aws ecr get-login-password --region ap-south-1 | docker login --username AWS --password-stdin 889168908024.dkr.ecr.ap-south-1.amazonaws.com

      - name: Build Backend Image
        run: |
          docker build --no-cache -t backend:v1 ./backend
          docker tag backend:v1 889168908024.dkr.ecr.ap-south-1.amazonaws.com/backend:v1
          docker push 889168908024.dkr.ecr.ap-south-1.amazonaws.com/backend:v1

      - name: Build Frontend Image
        run: |
          docker build --no-cache --build-arg VITE_API_URL=http://a99740ee92415435f9abe6c44d7a620b-1171611830.ap-south-1.elb.amazonaws.com -t frontend:v1 ./frontend
          docker tag frontend:v1 889168908024.dkr.ecr.ap-south-1.amazonaws.com/frontend:v1
          docker push 889168908024.dkr.ecr.ap-south-1.amazonaws.com/frontend:v1

      - name: Show docker images
        run: |
          docker images

      - name: Update Kubeconfig
        run: |
          aws eks update-kubeconfig --region ap-south-1 --name mycluster
          
      - name: Deploy to Kubernetes 
        run: |
          kubectl apply -f backend/backend-deployment.yaml
          kubectl apply -f backend/backend-service.yaml
          kubectl apply -f frontend/frontend-deployment.yaml
          kubectl apply -f frontend/frontend-service.yaml
          
      - name:  Restart Deployments
        run:  |
          kubectl rollout restart deployment backend-deployment
          kubectl rollout restart deployment frontend-deployment
