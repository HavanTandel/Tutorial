name: Deploy mern to eks

on: 
  workflow_dispatch:
  push:
    branches:
      - main

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Code
        uses: actions/checkout@v3

      - name: Configure AWS Credential
        uses: aws-actions/configure-aws-credentials@v2
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ap-south-1
      
      - name: Login to ECR
        run:  |
          aws ecr get-login-password --region ap-south-1 | docker login --username AWS --password-stdin 889168908024.dkr.ecr.ap-south-1.amazonaws.com

      - name: Build Backend Image
        run: |
          docker build -t backend ./backend
          docker tag backend:latest 889168908024.dkr.ecr.ap-south-1.amazonaws.com/backend:latest
          docker push 889168908024.dkr.ecr.ap-south-1.amazonaws.com/backend:latest

      - name: Build Frontend Image
        run: |
          docker build -t frontend ./frontend
          docker tag frontend:latest 889168908024.dkr.ecr.ap-south-1.amazonaws.com/frontend:latest
          docker push 889168908024.dkr.ecr.ap-south-1.amazonaws.com/frontend:latest

      - name: Update Kubeconfig
        run: |
          aws eks update-kubeconfig --region ap-south-1 --name mycluster
          
      - name: Deploy to Kubernetes 
        run: |
          kubectl apply -f backend/backend.yaml
          kubectl apply -f frontend/frontend.yaml
          
      - name:  Restart Deployments
        run:  |
          kubectl rollout restart deployment backend-deployment
          kubectl rollout restart deployment frontend-deployment
